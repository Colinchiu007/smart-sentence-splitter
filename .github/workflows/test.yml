name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          python -m pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: |
          python -m pytest tests/integration/ -v --tb=short

      - name: Run performance baseline
        run: |
          python -m pytest "tests/unit/test_performance_baseline.py" -v --tb=short

      - name: Coverage
        if: matrix.python-version == '3.12'
        run: |
          pip install pytest-cov
          python -m pytest tests/ --cov=splitter --cov-report=term --cov-report=xml
        continue-on-error: true  # 不阻断, 仅报告

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check CHANGELOG updated
        run: |
          if ! grep -q "## \[$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)\]" CHANGELOG.md; then
            echo "❌ CHANGELOG.md missing entry for current version"
            exit 1
          fi
          echo "✅ CHANGELOG in sync with pyproject.toml"

      - name: Check README version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | cut -d'"' -f2)
          if ! grep -q "v$VERSION" README.md; then
            echo "❌ README.md missing v$VERSION reference"
            exit 1
          fi
          echo "✅ README version in sync"
